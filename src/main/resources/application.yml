spring:
  application:
    name: super-skylab
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      javax:
        persistence:
          validation:
            mode: none
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://super-skylab-db:5432/superSkyLabDB
    username: postgres
    password: postgres
  keycloak-datasource:
    url: jdbc:postgresql://keycloak-db:5432/keycloak
    username: keycloak
    password: keycloak
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB




  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/e-skylab
          jwk-set-uri: http://keycloak:8080/realms/e-skylab/protocol/openid-connect/certs



  ldap:
    urls: ldap://ldap-server:3389
    base: dc=yildizskylab,dc=com
    username: cn=Directory Manager
    password: admin
    base-environment:
      java.naming.ldap.attributes.binary: entryUUID


  mail:
    host: smtp.office365.com
    port: 587
    username: info@yildizskylab.com
    password: app-password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  rabbitmq:
    host: super-skylab-rabbitmq
    port: 5672
    username: rabbitMQ
    password: rabbitMQ
    virtual-host: /

keycloak:
  server-url: http://keycloak:8080
  internal-url: http://keycloak:8080
  realm: e-skylab
  client-id: super-skylab-cli
  client-secret: mVYEv3uHgnZ2p4sTyF0me93dW3TqjCpd
  admin-username: admin
  admin-password: admin
  ldap-provider-id: -yjSIG5dQRerbMvkGOKruQ


server:
  port: 9010


springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs


eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

r2:
  endpoint:
  public-url:
  access-key:
  secret-key:
  bucket-name: